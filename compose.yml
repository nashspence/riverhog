services:
  garage:
    image: dxflrs/garage:b72b090a097c8ee2711c8fb065d250ed68dcd0bf
    volumes:
      - garage-data:/var/lib/garage
      - ./tests/harness/garage.toml:/etc/garage.toml:ro

  tusd:
    image: tusproject/tusd:v2.8.0
    depends_on:
      - garage
    command:
      - "-host"
      - "0.0.0.0"
      - "-port"
      - "1080"
      - "-base-path"
      - "/files/"
      - "-s3-bucket"
      - "${ARC_S3_BUCKET}"
      - "-s3-endpoint"
      - "http://garage:3900"
      - "-s3-disable-ssl"
      - "-hooks-http"
      - "http://app:8000/internal/tusd/hooks"
      - "-hooks-http-forward-headers"
      - "X-Arc-Tusd-Hook-Secret"
    environment:
      AWS_ACCESS_KEY_ID: ${ARC_S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${ARC_S3_SECRET_ACCESS_KEY}
      AWS_REGION: ${ARC_S3_REGION}

  webdav:
    image: rclone/rclone:1.69.3
    depends_on:
      - garage
    command:
      - "serve"
      - "webdav"
      - "garage:${ARC_S3_BUCKET}/collections"
      - "--config"
      - "/config/rclone.conf"
      - "--read-only"
      - "--addr"
      - ":8080"
    ports:
      - "${ARC_WEBDAV_PORT:-8080}:8080"
    volumes:
      - ./tests/harness/rclone.conf:/config/rclone.conf:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    depends_on:
      - garage
      - tusd
    environment:
      ARC_OBJECT_STORE: ${ARC_OBJECT_STORE}
      ARC_S3_ENDPOINT_URL: ${ARC_S3_ENDPOINT_URL}
      ARC_S3_REGION: ${ARC_S3_REGION}
      ARC_S3_BUCKET: ${ARC_S3_BUCKET}
      ARC_S3_ACCESS_KEY_ID: ${ARC_S3_ACCESS_KEY_ID}
      ARC_S3_SECRET_ACCESS_KEY: ${ARC_S3_SECRET_ACCESS_KEY}
      ARC_S3_FORCE_PATH_STYLE: ${ARC_S3_FORCE_PATH_STYLE}
      ARC_GLACIER_ENDPOINT_URL: ${ARC_GLACIER_ENDPOINT_URL}
      ARC_GLACIER_REGION: ${ARC_GLACIER_REGION}
      ARC_GLACIER_BUCKET: ${ARC_GLACIER_BUCKET}
      ARC_GLACIER_ACCESS_KEY_ID: ${ARC_GLACIER_ACCESS_KEY_ID}
      ARC_GLACIER_SECRET_ACCESS_KEY: ${ARC_GLACIER_SECRET_ACCESS_KEY}
      ARC_GLACIER_FORCE_PATH_STYLE: ${ARC_GLACIER_FORCE_PATH_STYLE}
      ARC_GLACIER_PREFIX: ${ARC_GLACIER_PREFIX}
      ARC_GLACIER_BACKEND: ${ARC_GLACIER_BACKEND}
      ARC_GLACIER_STORAGE_CLASS: ${ARC_GLACIER_STORAGE_CLASS}
      ARC_GLACIER_UPLOAD_RETRY_LIMIT: ${ARC_GLACIER_UPLOAD_RETRY_LIMIT:-3}
      ARC_GLACIER_UPLOAD_RETRY_DELAY: ${ARC_GLACIER_UPLOAD_RETRY_DELAY:-5m}
      ARC_GLACIER_UPLOAD_SWEEP_INTERVAL: ${ARC_GLACIER_UPLOAD_SWEEP_INTERVAL:-30s}
      ARC_GLACIER_FAILURE_WEBHOOK_URL: ${ARC_GLACIER_FAILURE_WEBHOOK_URL:-}
      ARC_TUSD_BASE_URL: ${ARC_TUSD_BASE_URL}
      ARC_TUSD_HOOK_SECRET: ${ARC_TUSD_HOOK_SECRET}
      ARC_WEBDAV_ENABLED: ${ARC_WEBDAV_ENABLED}
      ARC_WEBDAV_ADDR: ${ARC_WEBDAV_ADDR}
      ARC_DB_PATH: ${ARC_DB_PATH}
      ARC_PUBLIC_BASE_URL: ${ARC_PUBLIC_BASE_URL:-http://app:8000}
      INCOMPLETE_UPLOAD_TTL: ${INCOMPLETE_UPLOAD_TTL:-24h}
      UPLOAD_EXPIRY_SWEEP_INTERVAL: ${UPLOAD_EXPIRY_SWEEP_INTERVAL:-30s}
      ARC_ENABLE_TEST_CONTROL: ${ARC_ENABLE_TEST_CONTROL:-0}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; payload = json.load(urllib.request.urlopen('http://127.0.0.1:8000/healthz')); assert payload['status'] == 'ok'",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
    ports:
      - "${ARC_API_PORT:-8000}:8000"
    volumes:
      - .:/app

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      ARC_OBJECT_STORE: ${ARC_OBJECT_STORE}
      ARC_S3_ENDPOINT_URL: ${ARC_S3_ENDPOINT_URL}
      ARC_S3_REGION: ${ARC_S3_REGION}
      ARC_S3_BUCKET: ${ARC_S3_BUCKET}
      ARC_S3_ACCESS_KEY_ID: ${ARC_S3_ACCESS_KEY_ID}
      ARC_S3_SECRET_ACCESS_KEY: ${ARC_S3_SECRET_ACCESS_KEY}
      ARC_S3_FORCE_PATH_STYLE: ${ARC_S3_FORCE_PATH_STYLE}
      ARC_GLACIER_ENDPOINT_URL: ${ARC_GLACIER_ENDPOINT_URL}
      ARC_GLACIER_REGION: ${ARC_GLACIER_REGION}
      ARC_GLACIER_BUCKET: ${ARC_GLACIER_BUCKET}
      ARC_GLACIER_ACCESS_KEY_ID: ${ARC_GLACIER_ACCESS_KEY_ID}
      ARC_GLACIER_SECRET_ACCESS_KEY: ${ARC_GLACIER_SECRET_ACCESS_KEY}
      ARC_GLACIER_FORCE_PATH_STYLE: ${ARC_GLACIER_FORCE_PATH_STYLE}
      ARC_GLACIER_PREFIX: ${ARC_GLACIER_PREFIX}
      ARC_GLACIER_BACKEND: ${ARC_GLACIER_BACKEND}
      ARC_GLACIER_STORAGE_CLASS: ${ARC_GLACIER_STORAGE_CLASS}
      ARC_GLACIER_UPLOAD_RETRY_LIMIT: ${ARC_GLACIER_UPLOAD_RETRY_LIMIT:-3}
      ARC_GLACIER_UPLOAD_RETRY_DELAY: ${ARC_GLACIER_UPLOAD_RETRY_DELAY:-5m}
      ARC_GLACIER_UPLOAD_SWEEP_INTERVAL: ${ARC_GLACIER_UPLOAD_SWEEP_INTERVAL:-30s}
      ARC_GLACIER_FAILURE_WEBHOOK_URL: ${ARC_GLACIER_FAILURE_WEBHOOK_URL:-}
      ARC_TUSD_BASE_URL: ${ARC_TUSD_BASE_URL}
      ARC_TUSD_HOOK_SECRET: ${ARC_TUSD_HOOK_SECRET}
      ARC_PUBLIC_BASE_URL: ${ARC_PUBLIC_BASE_URL:-http://app:8000}
      ARC_TEST_EXTERNAL_APP_BASE_URL: ${ARC_TEST_EXTERNAL_APP_BASE_URL:-http://app:8000}
      ARC_TEST_EXTERNAL_APP_DB_PATH: ${ARC_TEST_EXTERNAL_APP_DB_PATH:-/app/.compose/state.sqlite3}
      ARC_TEST_EXTERNAL_WEBDAV_BASE_URL: ${ARC_TEST_EXTERNAL_WEBDAV_BASE_URL:-http://webdav:8080}
      PYTHONPATH: /app:/app/src
    volumes:
      - .:/app

volumes:
  garage-data:

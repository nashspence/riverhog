name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Container Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Test Suite
        run: ./scripts/run-tests-in-dind.sh

openapi: 3.1.0
info:
  title: ARC API
  version: 1.0.0
  summary: MVP API for hot/cold archival storage
  description: Authoritative archive resources are durable across service restarts unless a specific contract explicitly expires or releases them.
servers:
  - url: /v1
paths:
  /collection-uploads:
    post:
      summary: Create or resume one collection upload session
      description: Creates or resumes the explicit resumable upload session for one collection id and expected logical file set.
      operationId: createOrResumeCollectionUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionUploadRequest"
      responses:
        "200":
          description: Collection upload session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionUploadSession"
        default:
          $ref: "#/components/responses/Error"
  /collection-uploads/{collection_id}:
    get:
      summary: Get one collection upload session
      description: Returns the current resumable upload state for one collection id while it remains in progress. Once the terminal file-upload chunk finalizes the collection, this upload session is deleted and later reads return `not_found`.
      operationId: getCollectionUpload
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Explicit canonical collection id. Slash-bearing ids occupy multiple path segments.
          schema: { type: string }
      responses:
        "200":
          description: Collection upload session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionUploadSession"
        default:
          $ref: "#/components/responses/Error"
  /collection-uploads/{collection_id}/files/{path}/upload:
    post:
      summary: Create or resume one collection-file upload resource
      description: Creates or resumes one Riverhog-managed tus-compatible upload resource for one logical collection file until the published expiry time discards incomplete state.
      operationId: createOrResumeCollectionFileUpload
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Explicit canonical collection id. Slash-bearing ids occupy multiple path segments.
          schema: { type: string }
        - in: path
          name: path
          required: true
          description: Relative logical file path within the collection.
          schema: { type: string }
      responses:
        "200":
          description: Collection-file upload session
          headers:
            Tus-Resumable:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
            Upload-Offset:
              schema: { type: integer, minimum: 0 }
            Upload-Length:
              schema: { type: integer, minimum: 0 }
            Upload-Expires:
              schema: { type: string, format: date-time }
            Location:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionFileUploadSession"
        default:
          $ref: "#/components/responses/Error"
    patch:
      summary: Append one collection-file upload chunk
      description: Streams bytes into the resumable upload resource. When the final required chunk completes the last outstanding file and the full-file hashes verify, Riverhog finalizes the collection immediately and deletes the upload session.
      operationId: appendCollectionFileUploadChunk
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Explicit canonical collection id. Slash-bearing ids occupy multiple path segments.
          schema: { type: string }
        - in: path
          name: path
          required: true
          description: Relative logical file path within the collection.
          schema: { type: string }
        - in: header
          name: Tus-Resumable
          required: true
          schema: { type: string, enum: ["1.0.0"] }
        - in: header
          name: Upload-Offset
          required: true
          schema: { type: integer, minimum: 0 }
        - in: header
          name: Upload-Checksum
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/offset+octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: Chunk accepted
          headers:
            Tus-Resumable:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
            Upload-Offset:
              schema: { type: integer, minimum: 0 }
            Upload-Length:
              schema: { type: integer, minimum: 0 }
            Upload-Expires:
              schema: { type: string, format: date-time }
        default:
          $ref: "#/components/responses/Error"
    head:
      summary: Read one collection-file upload resource state
      description: Returns the current tus-style offset and metadata for one existing Riverhog-managed collection-file upload resource. Returns `not_found` once the upload resource no longer exists.
      operationId: headCollectionFileUpload
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Explicit canonical collection id. Slash-bearing ids occupy multiple path segments.
          schema: { type: string }
        - in: path
          name: path
          required: true
          description: Relative logical file path within the collection.
          schema: { type: string }
      responses:
        "204":
          description: Current collection-file upload resource state
          headers:
            Tus-Resumable:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
            Upload-Offset:
              schema: { type: integer, minimum: 0 }
            Upload-Length:
              schema: { type: integer, minimum: 0 }
            Upload-Expires:
              schema: { type: string, format: date-time }
            Location:
              schema: { type: string }
        default:
          $ref: "#/components/responses/Error"
    delete:
      summary: Cancel one collection-file upload resource
      description: Cancels one existing Riverhog-managed collection-file upload resource, deletes any incomplete server-side bytes for that file, and resets that file back to `pending`.
      operationId: deleteCollectionFileUpload
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Explicit canonical collection id. Slash-bearing ids occupy multiple path segments.
          schema: { type: string }
        - in: path
          name: path
          required: true
          description: Relative logical file path within the collection.
          schema: { type: string }
      responses:
        "204":
          description: Upload resource canceled
          headers:
            Tus-Resumable:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
        default:
          $ref: "#/components/responses/Error"
    options:
      summary: Describe collection-file upload resource capabilities
      description: Returns the tus-compatible capability headers Riverhog supports for collection-file upload resources.
      operationId: optionsCollectionFileUpload
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Explicit canonical collection id. Slash-bearing ids occupy multiple path segments.
          schema: { type: string }
        - in: path
          name: path
          required: true
          description: Relative logical file path within the collection.
          schema: { type: string }
      responses:
        "204":
          description: Upload resource capabilities
          headers:
            Tus-Resumable:
              schema: { type: string }
            Tus-Version:
              schema: { type: string }
            Tus-Extension:
              schema: { type: string }
            Tus-Checksum-Algorithm:
              schema: { type: string }
        default:
          $ref: "#/components/responses/Error"
  /search:
    get:
      summary: Search collections and files
      operationId: search
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [query, results]
                properties:
                  query: { type: string }
                  results:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/FileSearchResult"
                        - $ref: "#/components/schemas/CollectionSearchResult"
        default:
          $ref: "#/components/responses/Error"
  /collection-files/{collection_id}:
    get:
      summary: List files in a collection with per-file state
      description: Returns one page of files belonging to a collection with their hot/archived state.
      operationId: listCollectionFiles
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Canonical collection id. Slash-bearing ids occupy multiple path segments.
          schema: { type: string }
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Collection file listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionFilesResponse"
        default:
          $ref: "#/components/responses/Error"
  /files:
    get:
      summary: Query files matching a target selector
      description: Returns one page of files whose projected path matches the given target selector with their full state. Returns an empty list when no files match; never 404.
      operationId: queryFiles
      parameters:
        - in: query
          name: target
          required: true
          schema: { type: string }
          description: Canonical projected-path selector. File selectors return exactly matching files; directory selectors (ending with `/`) return all files under that prefix.
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Files matching the target selector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilesResponse"
        default:
          $ref: "#/components/responses/Error"
  /files/{target}/content:
    get:
      summary: Download raw bytes for a hot file
      description: Serves the raw bytes of the currently hot version of a file identified by its projected-path target. Returns 404 when the file is not hot or does not exist.
      operationId: getFileContent
      parameters:
        - in: path
          name: target
          required: true
          description: Canonical file target (not a directory selector). Slash-bearing targets occupy multiple path segments.
          schema: { type: string }
      responses:
        "200":
          description: Raw file bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/Error"
  /collections/{collection_id}:
    get:
      summary: Get one collection summary
      operationId: getCollection
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Canonical collection id. Slash-bearing ids occupy multiple path segments under `/collections/`.
          schema: { type: string }
      responses:
        "200":
          description: Collection summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionSummary"
        default:
          $ref: "#/components/responses/Error"
  /plan:
    get:
      summary: Get current burn plan
      description: Returns provisional planner output only. Finalized images do not appear in this plan.
      operationId: getPlan
      parameters:
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [fill, bytes, files, collections, candidate_id]
            default: fill
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: collection
          required: false
          schema: { type: string }
        - in: query
          name: iso_ready
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Planner output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanResponse"
  /images:
    get:
      summary: List finalized images
      description: Returns finalized images only, with conventional pagination, sorting, and filtering over finalized-image metadata.
      operationId: listImages
      parameters:
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [finalized_at, bytes, physical_copies_registered]
            default: finalized_at
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: collection
          required: false
          schema: { type: string }
        - in: query
          name: has_copies
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Finalized image list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizedImageListResponse"
        default:
          $ref: "#/components/responses/Error"
  /images/{image_id}:
    get:
      summary: Get one image summary
      description: Returns one finalized image summary. `image_id` is the compact UTC finalized id and media identifier.
      operationId: getImage
      parameters:
        - in: path
          name: image_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Image summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizedImageSummary"
        default:
          $ref: "#/components/responses/Error"
  /glacier:
    get:
      summary: Get Glacier usage and cost reporting
      description: Returns Glacier usage totals, per-image archive state, derived per-collection attribution, configured pricing assumptions, and overall usage snapshots.
      operationId: getGlacierReport
      parameters:
        - in: query
          name: image_id
          required: false
          schema: { type: string }
        - in: query
          name: collection
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Glacier usage report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlacierUsageReport"
        default:
          $ref: "#/components/responses/Error"
  /plan/candidates/{candidate_id}/finalize:
    post:
      summary: Explicitly finalize one provisional candidate
      description: Finalization is the only operation that creates a finalized image id, and the resulting finalized image remains addressable across service restarts.
      operationId: finalizeImage
      parameters:
        - in: path
          name: candidate_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Image finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizedImageSummary"
        default:
          $ref: "#/components/responses/Error"
  /images/{image_id}/iso:
    get:
      summary: Download ISO bytes for an image
      description: Downloads ISO bytes for an already finalized image. This endpoint is retrieval-only and does not finalize a provisional candidate.
      operationId: getImageIso
      parameters:
        - in: path
          name: image_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ISO stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/Error"
  /images/{image_id}/copies:
    get:
      summary: List generated copy slots for an image
      description: Returns the generated copy slots for one finalized image identified by `image_id`.
      operationId: listCopies
      parameters:
        - in: path
          name: image_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Copy listing
          content:
            application/json:
              schema:
                type: object
                required: [copies]
                properties:
                  copies:
                    type: array
                    items:
                      $ref: "#/components/schemas/CopySummary"
        default:
          $ref: "#/components/responses/Error"
    post:
      summary: Register a physical burned copy
      description: Registers one durable burned-disc record for an already finalized image identified by `image_id`.
      operationId: createCopy
      parameters:
        - in: path
          name: image_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location]
              properties:
                copy_id:
                  type: string
                  description: Optional generated copy id to claim explicitly for this finalized image.
                location:
                  type: string
                  description: Mutable operator-supplied physical location label. Not part of the copy identity.
      responses:
        "200":
          description: Copy registered
          content:
            application/json:
              schema:
                type: object
                required: [copy]
                properties:
                  copy:
                    $ref: "#/components/schemas/CopySummary"
        default:
          $ref: "#/components/responses/Error"
  /images/{image_id}/copies/{copy_id}:
    patch:
      summary: Update one generated copy record
      description: Updates mutable operational metadata for one generated copy slot on a finalized image.
      operationId: updateCopy
      parameters:
        - in: path
          name: image_id
          required: true
          schema: { type: string }
        - in: path
          name: copy_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                  nullable: true
                  description: Updated physical location label. Not part of copy identity.
                state:
                  type: string
                  nullable: true
                  enum: [needed, burning, verified, registered, lost, damaged, retired]
                verification_state:
                  type: string
                  nullable: true
                  enum: [pending, verified, failed]
      responses:
        "200":
          description: Updated copy record
          content:
            application/json:
              schema:
                type: object
                required: [copy]
                properties:
                  copy:
                    $ref: "#/components/schemas/CopySummary"
        default:
          $ref: "#/components/responses/Error"
  /pin:
    post:
      summary: Pin a target into hot storage
      description: Creates or reuses one exact pin that remains active until release, including across service restarts.
      operationId: pinTarget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  $ref: "#/components/schemas/Target"
      responses:
        "200":
          description: Pin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        default:
          $ref: "#/components/responses/Error"
  /release:
    post:
      summary: Release an exact pin target
      operationId: releaseTarget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  $ref: "#/components/schemas/Target"
      responses:
        "200":
          description: Release result
          content:
            application/json:
              schema:
                type: object
                required: [target, pin]
                properties:
                  target:
                    $ref: "#/components/schemas/Target"
                  pin:
                    type: boolean
                    const: false
        default:
          $ref: "#/components/responses/Error"
  /pins:
    get:
      summary: List active pins
      description: Lists durable exact pins that remain active until release.
      operationId: listPins
      responses:
        "200":
          description: Active pins
          content:
            application/json:
              schema:
                type: object
                required: [pins]
                properties:
                  pins:
                    type: array
                    items:
                      $ref: "#/components/schemas/PinSummary"
  /fetches/{fetch_id}:
    get:
      summary: Get fetch summary
      description: Returns one durable pin-scoped fetch summary while the exact pin remains active.
      operationId: getFetch
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Fetch summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchSummary"
        default:
          $ref: "#/components/responses/Error"
  /fetches/{fetch_id}/manifest:
    get:
      summary: Get fetch manifest
      description: Returns the stable fetch manifest and any unexpired upload progress for one active exact pin.
      operationId: getFetchManifest
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Fetch manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchManifest"
        default:
          $ref: "#/components/responses/Error"
  /fetches/{fetch_id}/entries/{entry_id}/upload:
    post:
      summary: Create or resume one fetch-entry upload resource
      description: Creates or resumes one restart-safe Riverhog-managed tus-compatible upload resource for the fetch entry until the published expiry time discards incomplete state.
      operationId: createOrResumeFetchEntryUpload
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
        - in: path
          name: entry_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Upload resource ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchUploadSession"
        default:
          $ref: "#/components/responses/Error"
    patch:
      summary: Append bytes to one fetch-entry upload resource
      description: Appends one chunk to an existing Riverhog-managed fetch-entry upload resource using tus-compatible checksum and offset headers.
      operationId: appendFetchEntryUploadChunk
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
        - in: path
          name: entry_id
          required: true
          schema: { type: string }
        - in: header
          name: Tus-Resumable
          required: true
          schema: { type: string, enum: ["1.0.0"] }
        - in: header
          name: Upload-Offset
          required: true
          schema: { type: integer, minimum: 0 }
        - in: header
          name: Upload-Checksum
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/offset+octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: Chunk accepted
          headers:
            Tus-Resumable:
              schema: { type: string, enum: ["1.0.0"] }
            Upload-Offset:
              schema: { type: integer, minimum: 0 }
            Upload-Length:
              schema: { type: integer, minimum: 0 }
            Upload-Expires:
              schema: { type: string, format: date-time }
            Location:
              schema: { type: string }
        default:
          $ref: "#/components/responses/Error"
    head:
      summary: Read one fetch-entry upload resource state
      description: Returns the current tus-style offset and metadata for one existing Riverhog-managed fetch-entry upload resource. Returns `not_found` once the upload resource no longer exists.
      operationId: headFetchEntryUpload
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
        - in: path
          name: entry_id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Upload resource state
          headers:
            Tus-Resumable:
              schema: { type: string, enum: ["1.0.0"] }
            Upload-Offset:
              schema: { type: integer, minimum: 0 }
            Upload-Length:
              schema: { type: integer, minimum: 0 }
            Upload-Expires:
              schema: { type: string, format: date-time }
            Location:
              schema: { type: string }
        default:
          $ref: "#/components/responses/Error"
    delete:
      summary: Cancel one fetch-entry upload resource
      description: Cancels one existing Riverhog-managed fetch-entry upload resource, deletes any incomplete server-side bytes for that entry, and resets that entry back to `pending`.
      operationId: deleteFetchEntryUpload
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
        - in: path
          name: entry_id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Upload resource canceled
          headers:
            Tus-Resumable:
              schema: { type: string, enum: ["1.0.0"] }
        default:
          $ref: "#/components/responses/Error"
    options:
      summary: Describe fetch-entry upload resource capabilities
      description: Returns the tus-compatible capability headers Riverhog supports for fetch-entry upload resources.
      operationId: optionsFetchEntryUpload
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
        - in: path
          name: entry_id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Upload resource capabilities
          headers:
            Tus-Resumable:
              schema: { type: string, enum: ["1.0.0"] }
            Tus-Version:
              schema: { type: string, enum: ["1.0.0"] }
            Tus-Extension:
              schema: { type: string }
            Tus-Checksum-Algorithm:
              schema: { type: string }
        default:
          $ref: "#/components/responses/Error"
  /fetches/{fetch_id}/complete:
    post:
      summary: Complete a fetch
      operationId: completeFetch
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Fetch completed
          content:
            application/json:
              schema:
                type: object
                required: [id, state, hot]
                properties:
                  id: { type: string }
                  state:
                    $ref: "#/components/schemas/FetchState"
                  hot:
                    $ref: "#/components/schemas/HotStatus"
        default:
          $ref: "#/components/responses/Error"
components:
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Target:
      type: string
      description: Canonical projected-path selector relative to the hot-view root. Directory selectors end with `/` and file selectors do not.
    FetchState:
      type: string
      enum: [waiting_media, uploading, verifying, done, failed]
    FetchEntryUploadState:
      type: string
      enum: [pending, partial, byte_complete, uploaded]
    ProtectionState:
      type: string
      enum: [unprotected, partially_protected, protected]
    GlacierArchive:
      type: object
      required:
        [state, object_path, stored_bytes, backend, storage_class, last_uploaded_at, last_verified_at, failure]
      properties:
        state:
          type: string
          enum: [pending, uploading, uploaded, retrying, failed]
        object_path:
          oneOf:
            - type: string
            - type: "null"
        stored_bytes:
          oneOf:
            - type: integer
            - type: "null"
        backend:
          oneOf:
            - type: string
            - type: "null"
        storage_class:
          oneOf:
            - type: string
            - type: "null"
        last_uploaded_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        last_verified_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        failure:
          oneOf:
            - type: string
            - type: "null"
    GlacierPricingBasis:
      type: object
      required:
        [
          label,
          source,
          storage_class,
          glacier_storage_rate_usd_per_gib_month,
          standard_storage_rate_usd_per_gib_month,
          archived_metadata_bytes_per_object,
          standard_metadata_bytes_per_object,
          minimum_storage_duration_days,
        ]
      properties:
        label: { type: string }
        source: { type: string }
        storage_class: { type: string }
        glacier_storage_rate_usd_per_gib_month: { type: number }
        standard_storage_rate_usd_per_gib_month: { type: number }
        archived_metadata_bytes_per_object: { type: integer }
        standard_metadata_bytes_per_object: { type: integer }
        minimum_storage_duration_days:
          type: integer
          minimum: 1
        currency_code:
          oneOf:
            - type: string
            - type: "null"
        region_code:
          oneOf:
            - type: string
            - type: "null"
        effective_at:
          oneOf:
            - type: string
            - type: "null"
        price_list_arn:
          oneOf:
            - type: string
            - type: "null"
    GlacierUsageTotals:
      type: object
      required:
        [images, uploaded_images, measured_storage_bytes, estimated_billable_bytes, estimated_monthly_cost_usd]
      properties:
        images:
          type: integer
          minimum: 0
        uploaded_images:
          type: integer
          minimum: 0
        measured_storage_bytes:
          type: integer
          minimum: 0
        estimated_billable_bytes:
          type: integer
          minimum: 0
        estimated_monthly_cost_usd:
          type: number
          minimum: 0
    GlacierUsageImage:
      type: object
      required:
        [
          id,
          filename,
          collection_ids,
          glacier,
          measured_storage_bytes,
          estimated_billable_bytes,
          estimated_monthly_cost_usd,
        ]
      properties:
        id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
        filename: { type: string }
        collection_ids:
          type: array
          items: { type: string }
        glacier:
          $ref: "#/components/schemas/GlacierArchive"
        measured_storage_bytes:
          type: integer
          minimum: 0
        estimated_billable_bytes:
          type: integer
          minimum: 0
        estimated_monthly_cost_usd:
          type: number
          minimum: 0
    GlacierCollectionContribution:
      type: object
      required:
        [
          image_id,
          filename,
          glacier,
          represented_bytes,
          represented_fraction,
          derived_stored_bytes,
          derived_billable_bytes,
          estimated_monthly_cost_usd,
        ]
      properties:
        image_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
        filename: { type: string }
        glacier:
          $ref: "#/components/schemas/GlacierArchive"
        represented_bytes:
          type: integer
          minimum: 0
        represented_fraction:
          oneOf:
            - type: number
            - type: "null"
        derived_stored_bytes:
          oneOf:
            - type: integer
              minimum: 0
            - type: "null"
        derived_billable_bytes:
          oneOf:
            - type: integer
              minimum: 0
            - type: "null"
        estimated_monthly_cost_usd:
          oneOf:
            - type: number
              minimum: 0
            - type: "null"
    GlacierUsageCollection:
      type: object
      required:
        [
          id,
          bytes,
          represented_bytes,
          attribution_state,
          derived_stored_bytes,
          derived_billable_bytes,
          estimated_monthly_cost_usd,
          images,
        ]
      properties:
        id: { type: string }
        bytes:
          type: integer
          minimum: 0
        represented_bytes:
          type: integer
          minimum: 0
        attribution_state:
          type: string
          enum: [derived, unavailable]
        derived_stored_bytes:
          type: integer
          minimum: 0
        derived_billable_bytes:
          type: integer
          minimum: 0
        estimated_monthly_cost_usd:
          type: number
          minimum: 0
        images:
          type: array
          items:
            $ref: "#/components/schemas/GlacierCollectionContribution"
    GlacierUsageSnapshot:
      type: object
      required:
        [captured_at, uploaded_images, measured_storage_bytes, estimated_billable_bytes, estimated_monthly_cost_usd]
      properties:
        captured_at:
          type: string
          format: date-time
        uploaded_images:
          type: integer
          minimum: 0
        measured_storage_bytes:
          type: integer
          minimum: 0
        estimated_billable_bytes:
          type: integer
          minimum: 0
        estimated_monthly_cost_usd:
          type: number
          minimum: 0
    GlacierBillingActual:
      type: object
      required: [start, end, estimated, unblended_cost_usd]
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
        estimated:
          type: boolean
        unblended_cost_usd:
          type: number
          minimum: 0
        usage_quantity:
          oneOf:
            - type: number
            - type: "null"
        usage_unit:
          oneOf:
            - type: string
            - type: "null"
    GlacierBillingForecast:
      type: object
      required: [start, end, mean_cost_usd]
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
        mean_cost_usd:
          type: number
          minimum: 0
        lower_bound_cost_usd:
          oneOf:
            - type: number
              minimum: 0
            - type: "null"
        upper_bound_cost_usd:
          oneOf:
            - type: number
              minimum: 0
            - type: "null"
        currency_code:
          oneOf:
            - type: string
            - type: "null"
    GlacierBillingActualsView:
      type: object
      required: [source, scope, periods, notes]
      properties:
        source:
          type: string
        scope:
          type: string
        filter_label:
          oneOf:
            - type: string
            - type: "null"
        service:
          oneOf:
            - type: string
            - type: "null"
        granularity:
          oneOf:
            - type: string
            - type: "null"
        measured_at:
          oneOf:
            - type: string
            - type: "null"
        periods:
          type: array
          items:
            $ref: "#/components/schemas/GlacierBillingActual"
        notes:
          type: array
          items:
            type: string
    GlacierBillingForecastView:
      type: object
      required: [source, scope, periods, notes]
      properties:
        source:
          type: string
        scope:
          type: string
        filter_label:
          oneOf:
            - type: string
            - type: "null"
        service:
          oneOf:
            - type: string
            - type: "null"
        currency_code:
          oneOf:
            - type: string
            - type: "null"
        granularity:
          oneOf:
            - type: string
            - type: "null"
        periods:
          type: array
          items:
            $ref: "#/components/schemas/GlacierBillingForecast"
        notes:
          type: array
          items:
            type: string
    GlacierBillingExportBreakdown:
      type: object
      required: [unblended_cost_usd]
      properties:
        usage_type:
          oneOf:
            - type: string
            - type: "null"
        operation:
          oneOf:
            - type: string
            - type: "null"
        resource_id:
          oneOf:
            - type: string
            - type: "null"
        tag_value:
          oneOf:
            - type: string
            - type: "null"
        unblended_cost_usd:
          type: number
        usage_quantity:
          oneOf:
            - type: number
            - type: "null"
        usage_unit:
          oneOf:
            - type: string
            - type: "null"
    GlacierBillingExportView:
      type: object
      required: [source, scope, rows_scanned, breakdowns, notes]
      properties:
        source:
          type: string
        scope:
          type: string
        filter_label:
          oneOf:
            - type: string
            - type: "null"
        service:
          oneOf:
            - type: string
            - type: "null"
        bucket:
          oneOf:
            - type: string
            - type: "null"
        prefix:
          oneOf:
            - type: string
            - type: "null"
        object_key:
          oneOf:
            - type: string
            - type: "null"
        exported_at:
          oneOf:
            - type: string
            - type: "null"
        currency_code:
          oneOf:
            - type: string
            - type: "null"
        rows_scanned:
          type: integer
        breakdowns:
          type: array
          items:
            $ref: "#/components/schemas/GlacierBillingExportBreakdown"
        notes:
          type: array
          items:
            type: string
    GlacierBillingInvoiceSummary:
      type: object
      properties:
        invoice_id:
          oneOf:
            - type: string
            - type: "null"
        account_id:
          oneOf:
            - type: string
            - type: "null"
        billing_period_start:
          oneOf:
            - type: string
            - type: "null"
        billing_period_end:
          oneOf:
            - type: string
            - type: "null"
        invoice_type:
          oneOf:
            - type: string
            - type: "null"
        invoicing_entity:
          oneOf:
            - type: string
            - type: "null"
        issued_at:
          oneOf:
            - type: string
            - type: "null"
        due_at:
          oneOf:
            - type: string
            - type: "null"
        base_currency_code:
          oneOf:
            - type: string
            - type: "null"
        base_total_amount:
          oneOf:
            - type: number
            - type: "null"
        payment_currency_code:
          oneOf:
            - type: string
            - type: "null"
        payment_total_amount:
          oneOf:
            - type: number
            - type: "null"
        original_invoice_id:
          oneOf:
            - type: string
            - type: "null"
    GlacierBillingInvoicesView:
      type: object
      required: [source, scope, invoices, notes]
      properties:
        source:
          type: string
        scope:
          type: string
        account_id:
          oneOf:
            - type: string
            - type: "null"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/GlacierBillingInvoiceSummary"
        notes:
          type: array
          items:
            type: string
    GlacierBillingSummary:
      type: object
      required: [notes]
      properties:
        actuals:
          oneOf:
            - $ref: "#/components/schemas/GlacierBillingActualsView"
            - type: "null"
        forecast:
          oneOf:
            - $ref: "#/components/schemas/GlacierBillingForecastView"
            - type: "null"
        exports:
          oneOf:
            - $ref: "#/components/schemas/GlacierBillingExportView"
            - type: "null"
        invoices:
          oneOf:
            - $ref: "#/components/schemas/GlacierBillingInvoicesView"
            - type: "null"
        notes:
          type: array
          items:
            type: string
    GlacierUsageReport:
      type: object
      required:
        [scope, measured_at, pricing_basis, totals, images, collections, history]
      properties:
        scope:
          type: string
          enum: [all, image, collection, filtered]
        measured_at:
          type: string
          format: date-time
        pricing_basis:
          $ref: "#/components/schemas/GlacierPricingBasis"
        totals:
          $ref: "#/components/schemas/GlacierUsageTotals"
        images:
          type: array
          items:
            $ref: "#/components/schemas/GlacierUsageImage"
        collections:
          type: array
          items:
            $ref: "#/components/schemas/GlacierUsageCollection"
        history:
          type: array
          items:
            $ref: "#/components/schemas/GlacierUsageSnapshot"
        billing:
          oneOf:
            - $ref: "#/components/schemas/GlacierBillingSummary"
            - type: "null"
    CollectionSummary:
      type: object
      required:
        [id, files, bytes, hot_bytes, archived_bytes, pending_bytes, protection_state, protected_bytes, image_coverage]
      properties:
        id:
          type: string
          description: Canonical collection id. May contain `/` and is prefix-free with every other collection id.
        files: { type: integer }
        bytes: { type: integer }
        hot_bytes: { type: integer }
        archived_bytes: { type: integer }
        pending_bytes: { type: integer }
        protection_state:
          $ref: "#/components/schemas/ProtectionState"
        protected_bytes:
          type: integer
        image_coverage:
          type: array
          items:
            $ref: "#/components/schemas/CollectionCoverageImage"
    CollectionUploadFile:
      type: object
      required: [path, bytes, sha256]
      properties:
        path:
          type: string
          description: Relative logical file path within the collection source tree.
        bytes: { type: integer }
        sha256:
          type: string
          description: Logical-file SHA-256 digest for final verification.
    CollectionUploadRequest:
      type: object
      required: [collection_id, files]
      properties:
        collection_id:
          type: string
          description: Explicit canonical collection id for this upload session.
        ingest_source:
          oneOf:
            - type: string
            - type: "null"
          description: Descriptive source hint from the client. Never part of collection identity.
        files:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CollectionUploadFile"
    CollectionUploadFileState:
      type: object
      required: [path, bytes, sha256, upload_state, uploaded_bytes, upload_state_expires_at]
      properties:
        path: { type: string }
        bytes: { type: integer }
        sha256: { type: string }
        upload_state:
          $ref: "#/components/schemas/FetchEntryUploadState"
        uploaded_bytes:
          type: integer
          description: Accepted upload bytes for this logical file's plaintext stream.
        upload_state_expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
    CollectionUploadSession:
      type: object
      required:
        [
          collection_id,
          ingest_source,
          state,
          files_total,
          files_pending,
          files_partial,
          files_uploaded,
          bytes_total,
          uploaded_bytes,
          missing_bytes,
          upload_state_expires_at,
          files,
          collection,
        ]
      properties:
        collection_id:
          type: string
          description: Explicit canonical collection id for this upload session.
        ingest_source:
          oneOf:
            - type: string
            - type: "null"
        state:
          type: string
          enum: [uploading, finalized]
        files_total: { type: integer }
        files_pending: { type: integer }
        files_partial: { type: integer }
        files_uploaded: { type: integer }
        bytes_total: { type: integer }
        uploaded_bytes: { type: integer }
        missing_bytes: { type: integer }
        upload_state_expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        files:
          type: array
          items:
            $ref: "#/components/schemas/CollectionUploadFileState"
        collection:
          oneOf:
            - $ref: "#/components/schemas/CollectionSummary"
            - type: "null"
    CollectionFileUploadSession:
      type: object
      required: [path, protocol, upload_url, offset, length, checksum_algorithm, expires_at]
      properties:
        path: { type: string }
        protocol:
          type: string
          const: tus
        upload_url:
          type: string
          format: uri
        offset:
          type: integer
          description: Current accepted byte offset in the logical file's upload stream.
        length:
          type: integer
          description: Total logical-file byte length for the upload stream.
        checksum_algorithm:
          type: string
          const: sha256
        expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
    FinalizedImageSummary:
      type: object
      required:
        [
          id,
          filename,
          finalized_at,
          bytes,
          fill,
          files,
          collections,
          collection_ids,
          iso_ready,
          protection_state,
          physical_copies_required,
          physical_copies_registered,
          physical_copies_missing,
          glacier,
        ]
      properties:
        id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
          description: Canonical finalized image id and immutable media identifier.
        filename:
          type: string
          description: Stable ISO filename for the finalized image artifact.
        finalized_at:
          type: string
          format: date-time
          description: Expanded UTC timestamp encoded by the finalized image id.
        bytes: { type: integer }
        fill: { type: number }
        files: { type: integer }
        collections:
          type: integer
          description: Count of collection ids represented by the finalized image.
        collection_ids:
          type: array
          items: { type: string }
          description: Lexically sorted contained collection ids.
        iso_ready:
          type: boolean
          const: true
          description: Finalized images are always ISO-ready.
        protection_state:
          $ref: "#/components/schemas/ProtectionState"
        physical_copies_required:
          type: integer
          minimum: 1
        physical_copies_registered:
          type: integer
          minimum: 0
        physical_copies_missing:
          type: integer
          minimum: 0
        glacier:
          $ref: "#/components/schemas/GlacierArchive"
    FinalizedImageListResponse:
      type: object
      required: [page, per_page, total, pages, sort, order, images]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        pages:
          type: integer
          minimum: 0
        sort:
          type: string
          enum: [finalized_at, bytes, physical_copies_registered]
        order:
          type: string
          enum: [asc, desc]
        images:
          type: array
          items:
            $ref: "#/components/schemas/FinalizedImageSummary"
    CollectionCoverageImage:
      type: object
      required:
        [
          id,
          filename,
          protection_state,
          physical_copies_required,
          physical_copies_registered,
          physical_copies_missing,
          copies,
          glacier,
        ]
      properties:
        id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
        filename:
          type: string
        protection_state:
          $ref: "#/components/schemas/ProtectionState"
        physical_copies_required:
          type: integer
          minimum: 1
        physical_copies_registered:
          type: integer
          minimum: 0
        physical_copies_missing:
          type: integer
          minimum: 0
        copies:
          type: array
          items:
            $ref: "#/components/schemas/CopySummary"
        glacier:
          $ref: "#/components/schemas/GlacierArchive"
    CopyRef:
      type: object
      required: [id, volume_id, location]
      properties:
        id:
          type: string
          description: User-supplied copy id, unique within one finalized image/`volume_id`.
        volume_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
          description: Immutable media identifier for the burned image this copy belongs to.
        location:
          type: string
          description: Mutable physical location label. Not part of copy identity.
    CopySummary:
      type: object
      required:
        [id, volume_id, label_text, location, created_at, state, verification_state, history]
      properties:
        id:
          type: string
          description: Generated copy id, unique within one finalized image/`volume_id`.
        volume_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
          description: Immutable media identifier for the finalized image this copy belongs to.
        label_text:
          type: string
          description: Exact operator-facing disc label text for this generated copy slot.
        location:
          type: string
          nullable: true
          description: Mutable physical location label. Not part of copy identity.
        created_at: { type: string, format: date-time }
        state:
          type: string
          enum: [needed, burning, verified, registered, lost, damaged, retired]
        verification_state:
          type: string
          enum: [pending, verified, failed]
        history:
          type: array
          items:
            $ref: "#/components/schemas/CopyHistory"
    CopyHistory:
      type: object
      required: [at, event, state, verification_state, location]
      properties:
        at: { type: string, format: date-time }
        event: { type: string }
        state:
          type: string
          enum: [needed, burning, verified, registered, lost, damaged, retired]
        verification_state:
          type: string
          enum: [pending, verified, failed]
        location:
          type: string
          nullable: true
    HotStatus:
      type: object
      required: [state, present_bytes, missing_bytes]
      properties:
        state:
          type: string
          enum: [ready, waiting]
        present_bytes: { type: integer }
        missing_bytes: { type: integer }
    PinSummary:
      type: object
      required: [target, fetch]
      properties:
        target:
          $ref: "#/components/schemas/Target"
        fetch:
          $ref: "#/components/schemas/FetchHint"
    FetchHint:
      type: object
      required: [id, state, copies]
      properties:
        id: { type: string }
        state:
          $ref: "#/components/schemas/FetchState"
        copies:
          type: array
          items:
            $ref: "#/components/schemas/FetchCopyHint"
    FetchCopyHint:
      type: object
      required: [id, volume_id, location]
      properties:
        id: { type: string }
        volume_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
        location: { type: string }
    FetchSummary:
      type: object
      required:
        [
          id,
          target,
          state,
          files,
          bytes,
          entries_total,
          entries_pending,
          entries_partial,
          entries_byte_complete,
          entries_uploaded,
          uploaded_bytes,
          missing_bytes,
          upload_state_expires_at,
          copies,
        ]
      properties:
        id: { type: string }
        target:
          $ref: "#/components/schemas/Target"
        state:
          $ref: "#/components/schemas/FetchState"
        files: { type: integer }
        bytes:
          type: integer
          description: Total logical-file bytes selected by the exact pin.
        entries_total: { type: integer }
        entries_pending: { type: integer }
        entries_partial: { type: integer }
        entries_byte_complete: { type: integer }
        entries_uploaded: { type: integer }
        uploaded_bytes:
          type: integer
          description: Accepted upload bytes in the ordered recovery-byte stream exposed by the manifest.
        missing_bytes:
          type: integer
          description: Remaining upload bytes in the ordered recovery-byte stream exposed by the manifest.
        upload_state_expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        copies:
          type: array
          items:
            $ref: "#/components/schemas/FetchCopyHint"
    FetchManifestEntryCopy:
      type: object
      required: [copy, volume_id, location, disc_path, recovery_bytes, recovery_sha256]
      properties:
        copy: { type: string }
        volume_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
        location: { type: string }
        disc_path:
          type: string
          description: On-disc payload-object path whose raw encrypted bytes are uploaded for this recovery candidate.
        recovery_bytes:
          type: integer
          description: Exact raw encrypted byte length at `disc_path` for this recovery candidate.
        recovery_sha256:
          type: string
          description: SHA-256 of the exact raw encrypted byte stream at `disc_path` for this recovery candidate.
    FetchManifestEntry:
      type: object
      required:
        [id, path, bytes, sha256, recovery_bytes, upload_state, uploaded_bytes, upload_state_expires_at, copies]
      properties:
        id: { type: string }
        path: { type: string }
        bytes:
          type: integer
          description: Final logical-file byte length used by the server after decrypting and reconstructing uploaded recovery data.
        sha256:
          type: string
          description: Logical-file digest used by the server for final verification.
        recovery_bytes:
          type: integer
          description: Total upload length for this entry's ordered recovery-byte stream.
        upload_state:
          $ref: "#/components/schemas/FetchEntryUploadState"
        uploaded_bytes:
          type: integer
          description: Accepted upload bytes in this entry's ordered recovery-byte stream.
        upload_state_expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        copies:
          type: array
          items:
            $ref: "#/components/schemas/FetchManifestEntryCopy"
        parts:
          type: array
          items:
            $ref: "#/components/schemas/FetchManifestPart"
    FetchManifestPart:
      type: object
      required: [index, bytes, sha256, recovery_bytes, copies]
      properties:
        index: { type: integer }
        bytes:
          type: integer
          description: Logical plaintext length for this part after decryption.
        sha256:
          type: string
          description: Logical plaintext digest for this part, used by the server as a verification anchor.
        recovery_bytes:
          type: integer
          description: Raw encrypted byte length uploaded for this ordered recovery span.
        copies:
          type: array
          items:
            $ref: "#/components/schemas/FetchManifestEntryCopy"
    FetchManifest:
      type: object
      required: [id, target, entries]
      properties:
        id: { type: string }
        target:
          $ref: "#/components/schemas/Target"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FetchManifestEntry"
    FileSearchResult:
      type: object
      required: [kind, target, collection, path, bytes, hot, copies]
      properties:
        kind:
          type: string
          const: file
        target:
          $ref: "#/components/schemas/Target"
        collection: { type: string }
        path: { type: string }
        bytes: { type: integer }
        hot: { type: boolean }
        copies:
          type: array
          items:
            $ref: "#/components/schemas/CopyRef"
    CollectionSearchResult:
      type: object
      required: [kind, target, collection, files, bytes, hot_bytes, archived_bytes, pending_bytes]
      properties:
        kind:
          type: string
          const: collection
        target:
          $ref: "#/components/schemas/Target"
        collection: { type: string }
        files: { type: integer }
        bytes: { type: integer }
        hot_bytes: { type: integer }
        archived_bytes: { type: integer }
        pending_bytes: { type: integer }
    PinResponse:
      type: object
      required: [target, pin, hot, fetch]
      properties:
        target:
          $ref: "#/components/schemas/Target"
        pin: { type: boolean, const: true }
        hot:
          $ref: "#/components/schemas/HotStatus"
        fetch:
          allOf:
            - $ref: "#/components/schemas/FetchHint"
            - type: object
              required: [copies]
              properties:
                copies:
                  type: array
                  items:
                    $ref: "#/components/schemas/FetchCopyHint"
    FetchUploadSession:
      type: object
      required: [entry, protocol, upload_url, offset, length, checksum_algorithm, expires_at]
      properties:
        entry: { type: string }
        protocol:
          type: string
          const: tus
        upload_url:
          type: string
          format: uri
        offset:
          type: integer
          description: Current accepted byte offset in the entry's ordered recovery-byte stream.
        length:
          type: integer
          description: Total byte length of the entry's ordered recovery-byte stream.
        checksum_algorithm:
          type: string
          const: sha256
          description: Transport checksum algorithm for uploaded PATCH chunks, not the final logical-file digest.
        expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
    PlanCandidate:
      type: object
      required: [candidate_id, bytes, fill, collections, collection_ids, files, iso_ready]
      properties:
        candidate_id: { type: string }
        bytes: { type: integer }
        fill: { type: number }
        collections: { type: integer }
        collection_ids:
          type: array
          items: { type: string }
        files: { type: integer }
        iso_ready: { type: boolean }
    PlanResponse:
      type: object
      required: [page, per_page, total, pages, sort, order, ready, target_bytes, min_fill_bytes, candidates, unplanned_bytes]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        pages:
          type: integer
          minimum: 0
        sort:
          type: string
          enum: [fill, bytes, files, collections, candidate_id]
        order:
          type: string
          enum: [asc, desc]
        ready: { type: boolean }
        target_bytes: { type: integer }
        min_fill_bytes: { type: integer }
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/PlanCandidate"
        unplanned_bytes: { type: integer }
        note: { type: string }
    CollectionFileRecord:
      type: object
      required: [path, bytes, hot, archived]
      properties:
        path:
          type: string
          description: Relative file path within the collection, no leading slash.
        bytes: { type: integer }
        hot: { type: boolean }
        archived: { type: boolean }
    CollectionFilesResponse:
      type: object
      required: [collection_id, page, per_page, total, pages, files]
      properties:
        collection_id:
          type: string
          description: Canonical collection id.
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        pages:
          type: integer
          minimum: 0
        files:
          type: array
          items:
            $ref: "#/components/schemas/CollectionFileRecord"
    FileRecord:
      type: object
      required: [target, collection, path, bytes, sha256, hot, archived]
      properties:
        target:
          $ref: "#/components/schemas/Target"
        collection:
          type: string
          description: Canonical collection id owning this file.
        path:
          type: string
          description: Relative file path within the collection, no leading slash.
        bytes: { type: integer }
        sha256:
          type: string
          description: SHA-256 hex digest of the file content.
        hot: { type: boolean }
        archived: { type: boolean }
    FilesResponse:
      type: object
      required: [target, page, per_page, total, pages, files]
      properties:
        target:
          $ref: "#/components/schemas/Target"
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        pages:
          type: integer
          minimum: 0
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileRecord"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }

openapi: 3.1.0
info:
  title: ARC API
  version: 1.0.0
  summary: MVP API for hot/cold archival storage
servers:
  - url: /v1
paths:
  /collections/close:
    post:
      summary: Close a staged directory into a collection
      operationId: closeCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Absolute path to the staged directory. The collection id is the canonical relative path beneath the staging root.
      responses:
        "200":
          description: Collection created
          content:
            application/json:
              schema:
                type: object
                required: [collection]
                properties:
                  collection:
                    $ref: "#/components/schemas/CollectionSummary"
        default:
          $ref: "#/components/responses/Error"
  /search:
    get:
      summary: Search collections and files
      operationId: search
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [query, results]
                properties:
                  query: { type: string }
                  results:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/FileSearchResult"
                        - $ref: "#/components/schemas/CollectionSearchResult"
        default:
          $ref: "#/components/responses/Error"
  /collections/{collection_id}:
    get:
      summary: Get one collection summary
      operationId: getCollection
      parameters:
        - in: path
          name: collection_id
          required: true
          description: Canonical collection id. Slash-bearing ids occupy multiple path segments under `/collections/`.
          schema: { type: string }
      responses:
        "200":
          description: Collection summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CollectionSummary"
                  - type: object
                    properties:
                      copies:
                        type: array
                        items:
                          $ref: "#/components/schemas/CopyRef"
        default:
          $ref: "#/components/responses/Error"
  /plan:
    get:
      summary: Get current burn plan
      description: Planned images remain provisional until their first ISO download request. `volume_id` is `null` until that first successful download finalizes the image.
      operationId: getPlan
      responses:
        "200":
          description: Planner output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanResponse"
  /images/{image_id}:
    get:
      summary: Get one image summary
      description: Returns the stable API image handle plus its current stored `volume_id`, if the image has already been finalized by a first ISO download.
      operationId: getImage
      parameters:
        - in: path
          name: image_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Image summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageDetail"
        default:
          $ref: "#/components/responses/Error"
  /images/{image_id}/iso:
    get:
      summary: Download ISO bytes for an image
      description: The first successful download finalizes the image allocation, assigns and stores immutable `volume_id`, and prevents later planner re-allocation of that image's represented bytes.
      operationId: getImageIso
      parameters:
        - in: path
          name: image_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ISO stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/Error"
  /images/{image_id}/copies:
    post:
      summary: Register a physical burned copy
      description: Registers one burned disc for a finalized image. The physical copy identity is `(volume_id, copy_id)` and `location` is mutable metadata, not identity.
      operationId: createCopy
      parameters:
        - in: path
          name: image_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, location]
              properties:
                id:
                  type: string
                  description: User-supplied copy id. Must be unique within the finalized image and its stored `volume_id`.
                location:
                  type: string
                  description: Mutable operator-supplied physical location label. Not part of the copy identity.
      responses:
        "200":
          description: Copy registered
          content:
            application/json:
              schema:
                type: object
                required: [copy]
                properties:
                  copy:
                    $ref: "#/components/schemas/CopySummary"
        default:
          $ref: "#/components/responses/Error"
  /pin:
    post:
      summary: Pin a target into hot storage
      operationId: pinTarget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  $ref: "#/components/schemas/Target"
      responses:
        "200":
          description: Pin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        default:
          $ref: "#/components/responses/Error"
  /release:
    post:
      summary: Release an exact pin target
      operationId: releaseTarget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  $ref: "#/components/schemas/Target"
      responses:
        "200":
          description: Release result
          content:
            application/json:
              schema:
                type: object
                required: [target, pin]
                properties:
                  target:
                    $ref: "#/components/schemas/Target"
                  pin:
                    type: boolean
                    const: false
        default:
          $ref: "#/components/responses/Error"
  /pins:
    get:
      summary: List active pins
      operationId: listPins
      responses:
        "200":
          description: Active pins
          content:
            application/json:
              schema:
                type: object
                required: [pins]
                properties:
                  pins:
                    type: array
                    items:
                      $ref: "#/components/schemas/PinSummary"
  /fetches/{fetch_id}:
    get:
      summary: Get fetch summary
      operationId: getFetch
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Fetch summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchSummary"
        default:
          $ref: "#/components/responses/Error"
  /fetches/{fetch_id}/manifest:
    get:
      summary: Get fetch manifest
      operationId: getFetchManifest
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Fetch manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchManifest"
        default:
          $ref: "#/components/responses/Error"
  /fetches/{fetch_id}/entries/{entry_id}/upload:
    post:
      summary: Create or resume one fetch-entry upload resource
      operationId: createOrResumeFetchEntryUpload
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
        - in: path
          name: entry_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Upload resource ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchUploadSession"
        default:
          $ref: "#/components/responses/Error"
  /fetches/{fetch_id}/complete:
    post:
      summary: Complete a fetch
      operationId: completeFetch
      parameters:
        - in: path
          name: fetch_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Fetch completed
          content:
            application/json:
              schema:
                type: object
                required: [id, state, hot]
                properties:
                  id: { type: string }
                  state:
                    $ref: "#/components/schemas/FetchState"
                  hot:
                    $ref: "#/components/schemas/HotStatus"
        default:
          $ref: "#/components/responses/Error"
components:
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Target:
      type: string
      description: Canonical projected-path selector relative to the hot-view root. Directory selectors end with `/` and file selectors do not.
    FetchState:
      type: string
      enum: [waiting_media, uploading, verifying, done, failed]
    FetchEntryUploadState:
      type: string
      enum: [pending, partial, uploaded]
    CollectionSummary:
      type: object
      required: [id, files, bytes, hot_bytes, archived_bytes, pending_bytes]
      properties:
        id:
          type: string
          description: Canonical collection id. May contain `/` and is prefix-free with every other collection id.
        files: { type: integer }
        bytes: { type: integer }
        hot_bytes: { type: integer }
        archived_bytes: { type: integer }
        pending_bytes: { type: integer }
    ImageSummary:
      type: object
      required: [id, volume_id, bytes, fill, files, collections, iso_ready]
      properties:
        id:
          type: string
          description: Stable API handle for the planned image.
        volume_id:
          description: Immutable media identifier stored when the image is finalized by its first successful ISO download. `null` means the image is still provisional.
          oneOf:
            - type: string
              pattern: "^[0-9]{8}T[0-9]{6}Z$"
            - type: "null"
        bytes: { type: integer }
        fill: { type: number }
        files: { type: integer }
        collections: { type: integer }
        iso_ready: { type: boolean }
    ImageDetail:
      type: object
      required: [id, volume_id, bytes, fill, iso_ready, files, collections]
      properties:
        id:
          type: string
          description: Stable API handle for the planned image.
        volume_id:
          description: Immutable media identifier stored when the image is finalized by its first successful ISO download. `null` means the image is still provisional.
          oneOf:
            - type: string
              pattern: "^[0-9]{8}T[0-9]{6}Z$"
            - type: "null"
        bytes: { type: integer }
        fill: { type: number }
        iso_ready: { type: boolean }
        files: { type: integer }
        collections:
          type: array
          items: { type: string }
    CopyRef:
      type: object
      required: [id, volume_id, location]
      properties:
        id:
          type: string
          description: User-supplied copy id, unique within one finalized image/`volume_id`.
        volume_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
          description: Immutable media identifier for the burned image this copy belongs to.
        location:
          type: string
          description: Mutable physical location label. Not part of copy identity.
    CopySummary:
      type: object
      required: [id, image, volume_id, location, created_at]
      properties:
        id:
          type: string
          description: User-supplied copy id, unique within one finalized image/`volume_id`.
        image:
          type: string
          description: Stable API image handle associated with this burned copy.
        volume_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
          description: Immutable media identifier for the finalized image this copy belongs to.
        location:
          type: string
          description: Mutable physical location label. Not part of copy identity.
        created_at: { type: string, format: date-time }
    HotStatus:
      type: object
      required: [state, present_bytes, missing_bytes]
      properties:
        state:
          type: string
          enum: [ready, waiting]
        present_bytes: { type: integer }
        missing_bytes: { type: integer }
    PinSummary:
      type: object
      required: [target, fetch]
      properties:
        target:
          $ref: "#/components/schemas/Target"
        fetch:
          $ref: "#/components/schemas/FetchHint"
    FetchHint:
      type: object
      required: [id, state, copies]
      properties:
        id: { type: string }
        state:
          $ref: "#/components/schemas/FetchState"
        copies:
          type: array
          items:
            $ref: "#/components/schemas/FetchCopyHint"
    FetchCopyHint:
      type: object
      required: [id, volume_id, location]
      properties:
        id: { type: string }
        volume_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
        location: { type: string }
    FetchSummary:
      type: object
      required:
        [
          id,
          target,
          state,
          files,
          bytes,
          entries_total,
          entries_pending,
          entries_partial,
          entries_uploaded,
          uploaded_bytes,
          missing_bytes,
          upload_state_expires_at,
          copies,
        ]
      properties:
        id: { type: string }
        target:
          $ref: "#/components/schemas/Target"
        state:
          $ref: "#/components/schemas/FetchState"
        files: { type: integer }
        bytes:
          type: integer
          description: Total logical-file bytes selected by the exact pin.
        entries_total: { type: integer }
        entries_pending: { type: integer }
        entries_partial: { type: integer }
        entries_uploaded: { type: integer }
        uploaded_bytes:
          type: integer
          description: Accepted upload bytes in the ordered recovery-byte stream exposed by the manifest.
        missing_bytes:
          type: integer
          description: Remaining upload bytes in the ordered recovery-byte stream exposed by the manifest.
        upload_state_expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        copies:
          type: array
          items:
            $ref: "#/components/schemas/FetchCopyHint"
    FetchManifestEntryCopy:
      type: object
      required: [copy, volume_id, location, disc_path, recovery_bytes, recovery_sha256, enc]
      properties:
        copy: { type: string }
        volume_id:
          type: string
          pattern: "^[0-9]{8}T[0-9]{6}Z$"
        location: { type: string }
        disc_path:
          type: string
          description: On-disc payload-object path whose raw encrypted bytes are uploaded for this recovery candidate.
        recovery_bytes:
          type: integer
          description: Exact raw encrypted byte length at `disc_path` for this recovery candidate.
        recovery_sha256:
          type: string
          description: SHA-256 of the exact raw encrypted byte stream at `disc_path` for this recovery candidate.
        enc:
          type: object
          description: Opaque server-owned recovery metadata used to bind uploaded recovery bytes back to archived objects.
          additionalProperties: true
    FetchManifestEntry:
      type: object
      required:
        [id, path, bytes, sha256, recovery_bytes, upload_state, uploaded_bytes, upload_state_expires_at, copies]
      properties:
        id: { type: string }
        path: { type: string }
        bytes:
          type: integer
          description: Final logical-file byte length used by the server after decrypting and reconstructing uploaded recovery data.
        sha256:
          type: string
          description: Logical-file digest used by the server for final verification.
        recovery_bytes:
          type: integer
          description: Total upload length for this entry's ordered recovery-byte stream.
        upload_state:
          $ref: "#/components/schemas/FetchEntryUploadState"
        uploaded_bytes:
          type: integer
          description: Accepted upload bytes in this entry's ordered recovery-byte stream.
        upload_state_expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        copies:
          type: array
          items:
            $ref: "#/components/schemas/FetchManifestEntryCopy"
        parts:
          type: array
          items:
            $ref: "#/components/schemas/FetchManifestPart"
    FetchManifestPart:
      type: object
      required: [index, bytes, sha256, recovery_bytes, copies]
      properties:
        index: { type: integer }
        bytes:
          type: integer
          description: Logical plaintext length for this part after decryption.
        sha256:
          type: string
          description: Logical plaintext digest for this part, used by the server as a verification anchor.
        recovery_bytes:
          type: integer
          description: Raw encrypted byte length uploaded for this ordered recovery span.
        copies:
          type: array
          items:
            $ref: "#/components/schemas/FetchManifestEntryCopy"
    FetchManifest:
      type: object
      required: [id, target, entries]
      properties:
        id: { type: string }
        target:
          $ref: "#/components/schemas/Target"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FetchManifestEntry"
    FileSearchResult:
      type: object
      required: [kind, target, collection, path, bytes, hot, copies]
      properties:
        kind:
          type: string
          const: file
        target:
          $ref: "#/components/schemas/Target"
        collection: { type: string }
        path: { type: string }
        bytes: { type: integer }
        hot: { type: boolean }
        copies:
          type: array
          items:
            $ref: "#/components/schemas/CopyRef"
    CollectionSearchResult:
      type: object
      required: [kind, target, collection, files, bytes, hot_bytes, archived_bytes, pending_bytes]
      properties:
        kind:
          type: string
          const: collection
        target:
          $ref: "#/components/schemas/Target"
        collection: { type: string }
        files: { type: integer }
        bytes: { type: integer }
        hot_bytes: { type: integer }
        archived_bytes: { type: integer }
        pending_bytes: { type: integer }
    PinResponse:
      type: object
      required: [target, pin, hot, fetch]
      properties:
        target:
          $ref: "#/components/schemas/Target"
        pin: { type: boolean, const: true }
        hot:
          $ref: "#/components/schemas/HotStatus"
        fetch:
          allOf:
            - $ref: "#/components/schemas/FetchHint"
            - type: object
              required: [copies]
              properties:
                copies:
                  type: array
                  items:
                    $ref: "#/components/schemas/FetchCopyHint"
    FetchUploadSession:
      type: object
      required: [entry, protocol, upload_url, offset, length, checksum_algorithm, expires_at]
      properties:
        entry: { type: string }
        protocol:
          type: string
          const: tus
        upload_url:
          type: string
          format: uri
        offset:
          type: integer
          description: Current accepted byte offset in the entry's ordered recovery-byte stream.
        length:
          type: integer
          description: Total byte length of the entry's ordered recovery-byte stream.
        checksum_algorithm:
          type: string
          const: sha256
          description: Transport checksum algorithm for uploaded PATCH chunks, not the final logical-file digest.
        expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
    PlanImage:
      type: object
      required: [id, bytes, fill, collections, files, iso_ready]
      properties:
        id: { type: string }
        bytes: { type: integer }
        fill: { type: number }
        collections: { type: integer }
        files: { type: integer }
        iso_ready: { type: boolean }
    PlanResponse:
      type: object
      required: [ready, target_bytes, min_fill_bytes, images, unplanned_bytes]
      properties:
        ready: { type: boolean }
        target_bytes: { type: integer }
        min_fill_bytes: { type: integer }
        images:
          type: array
          items:
            $ref: "#/components/schemas/PlanImage"
        unplanned_bytes: { type: integer }
        note: { type: string }
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }

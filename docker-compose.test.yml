services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: riverhog-test:dev
    user: root
    working_dir: /workspace
    command: ["pytest"]
    environment:
      API_BASE_URL: http://archive.test
      API_TOKEN: test-api-token
      AGE_BATCHPASS_MAX_WORK_FACTOR: "2"
      AGE_BATCHPASS_PASSPHRASE: test-batchpass-passphrase
      AGE_BATCHPASS_WORK_FACTOR: "2"
      REDIS_URL: redis://redis:6379/0
      TEST_DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME}_default
      CONTAINER_TARGET_GB: "0.0025"
      CONTAINER_FILL_GB: "0.0015"
      CONTAINER_SPILL_FILL_GB: "0.0010"
      CONTAINER_BUFFER_MAX_GB: "0.0100"
      PYTHONWARNINGS: error
      PYTEST_ADDOPTS: -o cache_dir=/tmp/pytest-cache
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy

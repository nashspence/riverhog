<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Riverhog UI{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <a href="/">Dashboard</a>
      </nav>
    </header>

    <main>
      {% if flash_message %}
      <p class="flash success">{{ flash_message }}</p>
      {% endif %}
      {% if flash_error %}
      <p class="flash error">{{ flash_error }}</p>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>

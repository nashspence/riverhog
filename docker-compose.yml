services:
  api:
    build:
      context: ./api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./data/archive:/var/lib/archive
    depends_on:
      - redis

  tusd:
    image: tusproject/tusd:v2.8.0
    command:
      - /usr/local/bin/tusd
      - -host=0.0.0.0
      - -port=1080
      - -dir=/var/lib/archive/tusd
      - -hooks-http=http://api:8080/internal/tusd-hooks
      - -hooks-enabled-events=pre-create,post-create,post-receive,post-finish,post-terminate
      - -progress-hooks-interval=1s
      - -behind-proxy
    ports:
      - "${TUSD_PORT:-1080}:1080"
    volumes:
      - ./data/archive:/var/lib/archive
    depends_on:
      - api

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data

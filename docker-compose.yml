services:
  api:
    build:
      context: ./api
    image: riverhog-api:dev
    env_file:
      - .env
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./data/archive:/var/lib/archive
      - ./data/uploads:/var/lib/uploads
    depends_on:
      - redis

  ui:
    build:
      context: ./ui
    image: riverhog-ui:dev
    environment:
      RIVERHOG_API_BASE_URL: http://api:8080
      RIVERHOG_API_TOKEN: ${API_TOKEN:-change-me}
    ports:
      - "${UI_PORT:-8090}:8090"
    depends_on:
      - api

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
